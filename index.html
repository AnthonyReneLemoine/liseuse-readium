<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<title>Liseuse — Readium</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='2' width='20' height='28' rx='2' fill='%23c9933a'/%3E%3Crect x='6' y='2' width='4' height='28' fill='%23a07020'/%3E%3Crect x='11' y='8' width='10' height='1.5' rx='1' fill='white' opacity='.8'/%3E%3Crect x='11' y='12' width='7' height='1.5' rx='1' fill='white' opacity='.6'/%3E%3C/svg%3E">
<link rel="stylesheet" href="lib/reader.css">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ═══════════════════════════════════════════════════════
   CSS VARS & THEMES
═══════════════════════════════════════════════════════ */
:root {
  --bg: #0f0e0c;
  --bg2: #1a1814;
  --bg3: #242018;
  --text: #e8e3d8;
  --text2: #9a9488;
  --accent: #c9933a;
  --accent2: #e0b85c;
  --border: #2e2a22;
  --shadow: rgba(0,0,0,.5);
  --radius: 6px;
  --reader-bg: #0f0e0c;
  --reader-text: #e8e3d8;
}
[data-theme="sepia"] {
  --bg: #f5ead0; --bg2: #ede0c0; --bg3: #e5d6b0;
  --text: #4a3520; --text2: #7a6850; --accent: #8b5e2f;
  --accent2: #a0713a; --border: #d0c0a0; --shadow: rgba(100,80,40,.15);
  --reader-bg: #f7f1cf; --reader-text: #774c27;
}
[data-theme="day"] {
  --bg: #fafaf8; --bg2: #f0f0ec; --bg3: #e4e4e0;
  --text: #1a1a1a; --text2: #666; --accent: #2060c0;
  --accent2: #3080e0; --border: #ddd; --shadow: rgba(0,0,0,.08);
  --reader-bg: white; --reader-text: black;
}

/* ═══════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  overflow: hidden;
}
button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════════════════ */
.screen { display: none; width: 100%; height: 100vh; height: 100dvh; }
.screen.active { display: flex; flex-direction: column; }

/* ═══════════════════════════════════════════════════════
   LIBRARY
═══════════════════════════════════════════════════════ */
.lib-header {
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.lib-header h1 {
  font-family: 'Literata', serif;
  font-size: 1.3rem; font-weight: 400;
  letter-spacing: .06em; color: var(--accent);
}
.lib-actions { display: flex; gap: 10px; align-items: center; }
.lib-actions button, .lib-actions label {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius);
  background: var(--bg3); font-size: .85rem; font-weight: 500;
  transition: background .15s;
}
.lib-actions button:hover, .lib-actions label:hover { background: var(--accent); color: #fff; }
.lib-actions input[type="file"] { display: none; }
.version-tag { font-size: .65rem; color: var(--text2); letter-spacing: .1em; }

.lib-content {
  flex: 1; overflow-y: auto; padding: 24px;
}
.lib-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}
@media (max-width: 600px) {
  .lib-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 14px; }
}

.book-card {
  cursor: pointer; border-radius: var(--radius);
  background: var(--bg2); overflow: hidden;
  transition: transform .15s, box-shadow .15s;
  position: relative;
}
.book-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px var(--shadow); }
.book-cover {
  width: 100%; aspect-ratio: 2/3;
  object-fit: cover; background: var(--bg3);
  display: block;
}
.book-cover-placeholder {
  width: 100%; aspect-ratio: 2/3;
  background: linear-gradient(135deg, var(--bg3), var(--border));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Literata', serif; font-size: .9rem;
  color: var(--text2); text-align: center; padding: 12px;
}
.book-info { padding: 10px; }
.book-title {
  font-family: 'Literata', serif; font-size: .82rem;
  font-weight: 500; line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.book-author {
  font-size: .72rem; color: var(--text2); margin-top: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.book-progress {
  height: 3px; background: var(--border); margin-top: 6px; border-radius: 2px;
}
.book-progress-bar {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width .3s;
}
.book-card .delete-btn {
  position: absolute; top: 6px; right: 6px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,.6); color: #fff;
  display: none; align-items: center; justify-content: center;
  font-size: .75rem;
}
.book-card:hover .delete-btn { display: flex; }

.lib-empty {
  text-align: center; padding: 60px 20px; color: var(--text2);
}
.lib-empty p { font-size: 1rem; margin-bottom: 12px; }

/* sort/filter bar */
.lib-toolbar {
  display: flex; gap: 10px; align-items: center;
  padding: 12px 24px; background: var(--bg);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.lib-toolbar input {
  flex: 1; padding: 8px 12px; border-radius: var(--radius);
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-size: .85rem; outline: none;
}
.lib-toolbar input:focus { border-color: var(--accent); }
.lib-toolbar select {
  padding: 8px 10px; border-radius: var(--radius);
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); font-size: .82rem;
}

/* ═══════════════════════════════════════════════════════
   READER
═══════════════════════════════════════════════════════ */
.reader-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.reader-topbar .back-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: .85rem; padding: 6px 10px; border-radius: var(--radius);
}
.reader-topbar .back-btn:hover { background: var(--bg3); }
.reader-book-title {
  font-family: 'Literata', serif; font-size: .85rem;
  color: var(--text2); flex: 1; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin: 0 12px;
}
.reader-tools { display: flex; gap: 4px; }
.reader-tools button {
  width: 36px; height: 36px; display: flex;
  align-items: center; justify-content: center;
  border-radius: var(--radius); font-size: 1rem;
}
.reader-tools button:hover { background: var(--bg3); }

.reader-body { flex: 1; position: relative; display: flex; }

/* Navigation zones */
.nav-zone {
  position: absolute; top: 0; width: 60px; height: 100%;
  z-index: 5; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s;
}
.nav-zone:hover { opacity: 1; }
.nav-zone.left { left: 0; }
.nav-zone.right { right: 0; }
.nav-zone svg { width: 28px; height: 28px; fill: var(--text2); }

#epub-reader-frame {
  flex: 1; height: 100%; background: var(--reader-bg);
}

/* Progress bar */
.reader-progressbar {
  height: 4px; background: var(--border); flex-shrink: 0;
  cursor: pointer; position: relative;
}
.reader-progressbar-fill {
  height: 100%; background: var(--accent);
  transition: width .3s;
}
.reader-progressbar-label {
  position: absolute; right: 8px; top: -20px;
  font-size: .7rem; color: var(--text2);
}

/* ═══════════════════════════════════════════════════════
   PANELS (TOC, Settings, Bookmarks)
═══════════════════════════════════════════════════════ */
.panel-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.4); z-index: 50;
  display: none;
}
.panel-overlay.open { display: block; }
.panel {
  position: fixed; top: 0; right: -340px; width: 320px;
  height: 100%; background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 51; transition: right .25s;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel.open { right: 0; }
@media (max-width: 500px) {
  .panel { width: 85vw; right: -85vw; }
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.panel-header h3 {
  font-family: 'Literata', serif; font-size: 1rem; font-weight: 500;
}
.panel-close {
  width: 32px; height: 32px; display: flex;
  align-items: center; justify-content: center;
  border-radius: var(--radius); font-size: 1.1rem;
}
.panel-close:hover { background: var(--bg3); }
.panel-body { flex: 1; overflow-y: auto; padding: 12px 16px; }

/* TOC */
.toc-item {
  display: block; padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text); text-decoration: none;
  font-size: .85rem; cursor: pointer;
  transition: background .15s;
}
.toc-item:hover { background: var(--bg3); }
.toc-item.sub { padding-left: 24px; font-size: .8rem; color: var(--text2); }

/* Settings */
.setting-group { margin-bottom: 20px; }
.setting-label { font-size: .75rem; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .08em; }
.setting-row { display: flex; gap: 8px; flex-wrap: wrap; }
.setting-btn {
  padding: 8px 14px; border-radius: var(--radius);
  background: var(--bg3); font-size: .82rem;
  border: 1px solid var(--border); transition: all .15s;
}
.setting-btn:hover { border-color: var(--accent); }
.setting-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.font-size-slider {
  width: 100%; accent-color: var(--accent);
}

/* Bookmarks */
.bookmark-item {
  padding: 10px 8px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .15s;
}
.bookmark-item:hover { background: var(--bg3); }
.bookmark-text { font-size: .82rem; line-height: 1.4; }
.bookmark-meta { font-size: .7rem; color: var(--text2); margin-top: 4px; }
.bookmark-color {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 6px; vertical-align: middle;
}

/* ═══════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════ */
.auth-status {
  display: flex; align-items: center; gap: 8px;
  font-size: .8rem; color: var(--text2);
}
.auth-status .dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.auth-status .dot.on { background: #4a4; }
.auth-status .dot.off { background: #a44; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: var(--radius);
  background: var(--accent); color: #fff; font-size: .85rem;
  z-index: 100; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ═════════════════════════════════════════════════════
     LIBRARY SCREEN
═════════════════════════════════════════════════════ -->
<div id="library-screen" class="screen active">
  <div class="lib-header">
    <div>
      <h1>📖 Liseuse</h1>
      <span class="version-tag">v1.0 — Readium</span>
    </div>
    <div class="lib-actions">
      <label title="Ouvrir un fichier EPUB">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Ajouter
        <input type="file" id="file-input" accept=".epub" multiple>

      <button id="drive-btn" title="Google Drive">

<!-- ═════════════════════════════════════════════════════
     READER SCREEN
═════════════════════════════════════════════════════ -->
<div id="reader-screen" class="screen">
  <div class="reader-topbar">
    <button class="back-btn" id="back-to-lib">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Bibliothèque
    </button>
    <span class="reader-book-title" id="reader-title"></span>
    <div class="reader-tools">
      <button id="btn-toc" title="Table des matières">☰</button>
      <button id="btn-bookmarks" title="Signets">🔖</button>

  </div>

    </div>

  <div class="reader-progressbar" id="progress-bar">
    <div class="reader-progressbar-fill" id="progress-fill" style="width:0%"></div>
    <span class="reader-progressbar-label" id="progress-label"></span>
  </div>
</div>

<!-- ═════════════════════════════════════════════════════
     PANELS
═════════════════════════════════════════════════════ -->
<div class="panel-overlay" id="panel-overlay"></div>

<!-- TOC -->
<div class="panel" id="toc-panel">
  <div class="panel-header">
    <h3>Table des matières</h3>
    <button class="panel-close" data-close>✕</button>

</div>

<!-- Settings -->

<script src="lib/treinetic-epub-reader.umd.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════════ */
const APP = {
  books: [],          // {id, title, author, coverUrl, blobUrl, progress, lastRead, bookmarks[]}
  currentBookId: null,
  controls: null,     // ExternalControls
  theme: 'night',     // night | sepia | day
  fontSize: 100,
};

/* ═══════════════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════════════ */
const DB_NAME = 'liseuse-readium';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('books')) {
        db.createObjectStore('books', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('blobs')) {
        db.createObjectStore('blobs', { keyPath: 'id' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function saveBookMeta(book) {
  const db = await openDB();
  const tx = db.transaction('books', 'readwrite');
  const meta = { ...book };
  delete meta.blobUrl; // don't store blob URLs
  tx.objectStore('books').put(meta);
}

async function saveBookBlob(id, blob) {
  const db = await openDB();
  const tx = db.transaction('blobs', 'readwrite');
  tx.objectStore('blobs').put({ id, blob });
}

async function getBookBlob(id) {
  const db = await openDB();
  return new Promise(resolve => {
    const tx = db.transaction('blobs', 'readonly');
    const req = tx.objectStore('blobs').get(id);
    req.onsuccess = e => resolve(e.target.result?.blob || null);
    req.onerror = () => resolve(null);
  });
}

async function loadAllBooks() {
  const db = await openDB();
  return new Promise(resolve => {
    const tx = db.transaction('books', 'readonly');
    const req = tx.objectStore('books').getAll();
    req.onsuccess = e => resolve(e.target.result || []);
    req.onerror = () => resolve([]);
  });
}

async function deleteBook(id) {
  const db = await openDB();
  const tx1 = db.transaction('books', 'readwrite');
  tx1.objectStore('books').delete(id);
  const tx2 = db.transaction('blobs', 'readwrite');
  tx2.objectStore('blobs').delete(id);
}

/* ═══════════════════════════════════════════════════════
   EPUB METADATA EXTRACTION
═══════════════════════════════════════════════════════ */
async function extractEpubMeta(file) {
  const JSZip = window.TreineticEpubReader?.default?.readium?.JSZip;
  // The lib bundles JSZip internally; we load it from the UMD global
  // Actually the UMD doesn't expose JSZip directly, so we use our own mini extraction
  const arrayBuffer = await file.arrayBuffer();
  
  // Use the bundled JSZip from the module
  // The UMD exposes the reader at TreineticEpubReader global
  // We'll parse the EPUB ourselves for metadata
  let title = file.name.replace(/\.epub$/i, '');
  let author = '';
  let coverBlob = null;

  try {
    // Minimal EPUB parser for metadata+cover
    const zip = await loadZip(arrayBuffer);
    const containerXml = await zip.file('META-INF/container.xml')?.async('string');
    if (containerXml) {
      const parser = new DOMParser();
      const containerDoc = parser.parseFromString(containerXml, 'application/xml');
      const rootfile = containerDoc.querySelector('rootfile');
      const opfPath = rootfile?.getAttribute('full-path');
      if (opfPath) {
        const opfXml = await zip.file(opfPath)?.async('string');
        if (opfXml) {
          const opfDoc = parser.parseFromString(opfXml, 'application/xml');
          const md = opfDoc.querySelector('metadata');
          title = md?.querySelector('title')?.textContent || title;
          author = md?.querySelector('creator')?.textContent || '';
          
          // Find cover
          const coverMeta = md?.querySelector('meta[name="cover"]');
          const coverId = coverMeta?.getAttribute('content');
          let coverHref = null;
          if (coverId) {
            const coverItem = opfDoc.querySelector(`item[id="${coverId}"]`);
            coverHref = coverItem?.getAttribute('href');
          }
          if (!coverHref) {
            // Try cover-image property
            const coverItem = opfDoc.querySelector('item[properties~="cover-image"]');
            coverHref = coverItem?.getAttribute('href');
          }
          if (coverHref) {
            const dir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
            const fullPath = coverHref.startsWith('/') ? coverHref.substring(1) : dir + coverHref;
            const coverFile = zip.file(fullPath) || zip.file(coverHref);
            if (coverFile) {
              coverBlob = await coverFile.async('blob');
            }
          }
        }
      }
    }
  } catch (e) {
    console.warn('Metadata extraction failed:', e);
  }

  return { title, author, coverBlob };
}

// Minimal JSZip loader (reuse the one bundled in the UMD if possible)
let _jszip = null;
async function loadZip(arrayBuffer) {
  if (!_jszip) {
    // The UMD bundles JSZip internally. Let's try to grab it.
    // Looking at the source, JSZip is available as a local variable but not exported.
    // We'll need to load our own copy. The UMD already bundles it, but we can't access it.
    // Instead, let's use a tiny trick: the reader itself uses JSZip, so let's use the npm package.
    // Since we can't import, we'll use a dynamic script load from CDN.
    // BUT — for GitHub Pages we already have the UMD which bundles JSZip.
    // Let's extract JSZip from the global scope by loading it separately.
    
    // Actually, the simplest: import JSZip as a global from our UMD
    // The UMD does: (ot.TreineticEpubReader = {}). JSZip is internal only.
    // We need JSZip for our metadata extraction. Let's bundle it.
    // For now, we'll use dynamic import from unpkg as fallback.
    try {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
      await new Promise((res, rej) => { script.onload = res; script.onerror = rej; document.head.appendChild(script); });
      _jszip = window.JSZip;
    } catch (e) {
      console.error('Failed to load JSZip:', e);
      throw e;
    }
  }
  return _jszip.loadAsync(arrayBuffer);
}

/* ═══════════════════════════════════════════════════════
   LIBRARY UI
═══════════════════════════════════════════════════════ */
function renderLibrary() {
  const grid = document.getElementById('book-grid');
  const empty = document.getElementById('lib-empty');
  const searchTerm = document.getElementById('search-lib').value.toLowerCase();
  const sortBy = document.getElementById('sort-lib').value;

  let books = [...APP.books];
  
  // Filter
  if (searchTerm) {
    books = books.filter(b =>
      b.title.toLowerCase().includes(searchTerm) ||
      b.author.toLowerCase().includes(searchTerm)
    );
  }

  // Sort
  switch (sortBy) {
    case 'title': books.sort((a,b) => a.title.localeCompare(b.title)); break;
    case 'author': books.sort((a,b) => a.author.localeCompare(b.author)); break;
    case 'progress': books.sort((a,b) => (b.progress||0) - (a.progress||0)); break;
    case 'recent':
    default: books.sort((a,b) => (b.lastRead||0) - (a.lastRead||0)); break;
  }

  grid.innerHTML = '';
  if (books.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  books.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.onclick = () => openBook(book.id);

    let coverHtml;
    if (book.coverDataUrl) {
      coverHtml = `<img class="book-cover" src="${book.coverDataUrl}" alt="">`;
    } else {
      coverHtml = `<div class="book-cover-placeholder">${book.title}</div>`;
    }

    card.innerHTML = `
      ${coverHtml}
      <div class="book-info">
        <div class="book-title">${book.title}</div>
        <div class="book-author">${book.author || 'Inconnu'}</div>
        <div class="book-progress"><div class="book-progress-bar" style="width:${book.progress||0}%"></div></div>
      </div>
      <button class="delete-btn" title="Supprimer" onclick="event.stopPropagation(); removeBook('${book.id}')">✕</button>
    `;
    grid.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════════════
   ADD / REMOVE BOOKS
═══════════════════════════════════════════════════════ */
async function addBook(file) {
  const id = 'book_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
  const { title, author, coverBlob } = await extractEpubMeta(file);

  let coverDataUrl = null;
  if (coverBlob) {
    coverDataUrl = await blobToDataUrl(coverBlob);
  }

  const book = {
    id, title, author, coverDataUrl,
    progress: 0, lastRead: Date.now(),
    bookmarks: [],
  };

  APP.books.push(book);
  await saveBookMeta(book);
  await saveBookBlob(id, file);
  renderLibrary();
  toast(`"${title}" ajouté`);
}

async function removeBook(id) {
  if (!confirm('Supprimer ce livre ?')) return;
  APP.books = APP.books.filter(b => b.id !== id);
  await deleteBook(id);
  renderLibrary();
  toast('Livre supprimé');
}

function blobToDataUrl(blob) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.readAsDataURL(blob);
  });
}

/* ═══════════════════════════════════════════════════════
   OPEN BOOK
═══════════════════════════════════════════════════════ */
async function openBook(id) {
  const book = APP.books.find(b => b.id === id);
  if (!book) return;

  APP.currentBookId = id;
  book.lastRead = Date.now();
  await saveBookMeta(book);

  // Switch screen
  document.getElementById('library-screen').classList.remove('active');
  document.getElementById('reader-screen').classList.add('active');
  document.getElementById('reader-title').textContent = book.title;

  // Load EPUB blob
  const blob = await getBookBlob(id);
  if (!blob) { toast('EPUB introuvable'); return; }

  // Init reader
  const frame = document.getElementById('epub-reader-frame');
  frame.innerHTML = '';

  APP.controls = TreineticEpubReader.create('#epub-reader-frame');
  if (!APP.controls) {
    console.error('Failed to create reader');
    return;
  }

  // Register events
  APP.controls.registerEvent('onEpubLoadSuccess', () => {
    console.log('EPUB loaded successfully');
    applyTheme(APP.theme);
    applyFontSize(APP.fontSize);
    // Build TOC
    if (APP.controls.hasTOC()) {
      buildTOC(JSON.parse(APP.controls.getTOCJson()));
    }
  });

  APP.controls.registerEvent('onEpubLoadFail', (err) => {
    console.error('EPUB load failed:', err);
    toast('Erreur de chargement');
  });

  // Convert blob to a fake .epub URL so the lib's parser detects it as a zip
  // The lib checks url.toLowerCase().endsWith('.epub') to trigger JSZip mode
  const epubFile = new File([blob], 'book.epub', { type: 'application/epub+zip' });
  const epubBlobUrl = URL.createObjectURL(epubFile);
  // Unfortunately blob URLs don't carry the filename. We need to patch the load.
  // Instead, directly call the internal loadEpub with the blob as ArrayBuffer.
  try {
    const arrayBuffer = await blob.arrayBuffer();
    // Load JSZip (same one used internally or our external one)
    if (!window.JSZip) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
      await new Promise((res, rej) => { s.onload = res; s.onerror = rej; document.head.appendChild(s); });
    }
    const zip = await JSZip.loadAsync(arrayBuffer);

    // Parse the EPUB ourselves using the same logic as the lib's Pt class
    const containerXml = await zip.file('META-INF/container.xml')?.async('string');
    if (!containerXml) throw new Error('Not a valid EPUB: no container.xml');
    const parser = new DOMParser();
    const containerDoc = parser.parseFromString(containerXml, 'application/xml');
    const rootfile = containerDoc.querySelector('rootfile');
    const opfPath = rootfile?.getAttribute('full-path');
    if (!opfPath) throw new Error('No rootfile path');
    const opfXml = await zip.file(opfPath)?.async('string');
    if (!opfXml) throw new Error('OPF not found: ' + opfPath);
    const opfDoc = parser.parseFromString(opfXml, 'application/xml');

    // Extract metadata
    const md = opfDoc.querySelector('metadata');
    const metadata = {
      title: md?.querySelector('title')?.textContent || book.title,
      creator: md?.querySelector('creator')?.textContent || '',
      language: md?.querySelector('language')?.textContent || '',
      identifier: md?.querySelector('identifier')?.textContent || '',
    };

    // Build manifest map
    const manifest = {};
    opfDoc.querySelectorAll('manifest item').forEach(item => {
      const itemId = item.getAttribute('id');
      const href = item.getAttribute('href');
      if (itemId && href) manifest[itemId] = href;
    });

    // Build spine
    const spineEl = opfDoc.querySelector('spine');
    const spineItems = [];
    spineEl.querySelectorAll('itemref').forEach(ref => {
      const idref = ref.getAttribute('idref');
      if (idref && manifest[idref]) {
        spineItems.push({
          idref,
          href: manifest[idref],
          linear: ref.getAttribute('linear') || 'yes',
        });
      }
    });

    // Parse TOC (NCX)
    let toc = [];
    const tocId = spineEl.getAttribute('toc');
    if (tocId && manifest[tocId]) {
      const ncxPath = opfPath.substring(0, opfPath.lastIndexOf('/') + 1) + manifest[tocId];
      const ncxXml = await zip.file(ncxPath)?.async('string');
      if (ncxXml) {
        const ncxDoc = parser.parseFromString(ncxXml, 'application/xml');
        const navMap = ncxDoc.querySelector('navMap');
        if (navMap) {
          function parseNav(parent) {
            const items = [];
            for (const child of parent.children) {
              if (child.tagName.toLowerCase() === 'navpoint') {
                const name = child.querySelector('navLabel > text')?.textContent || '';
                const src = child.querySelector('content')?.getAttribute('src') || '';
                items.push({ name, Id_link: src, sub: parseNav(child) });
              }
            }
            return items;
          }
          toc = parseNav(navMap);
        }
      }
    }

    // Build package object compatible with the lib's internal format
    const opfDir = opfPath.substring(0, opfPath.lastIndexOf('/') + 1);
    const epubPackage = {
      rootUrl: '',
      metadata,
      spine: { items: spineItems },
      toc,
      zip,
      rendition_layout: md?.querySelector("meta[property='rendition:layout']")?.textContent || 'reflowable',
    };

    // Access the internal readerView from the default export
    const readerObj = TreineticEpubReader.default || TreineticEpubReader;

    // The lib has an internal class Gt (package) that wraps the data.
    // We need to construct it properly. The readerView.openBook expects a Gt instance.
    // Since we can't access the class directly, we'll hack loadEpub to use our zip.

    // Override the Pt.load to return our pre-parsed data
    // Actually, the simplest approach: create a local HTTP-like URL from the blob
    // that includes the .epub extension.
    // Trick: we can use a Service Worker or a renamed blob. But the simplest:
    // Just rename the blob URL by appending #.epub — won't work.

    // Better approach: monkey-patch the internal fetch for this load
    const origFetch = window.fetch;
    window.fetch = async function(url, opts) {
      const urlStr = typeof url === 'string' ? url : url.url || '';
      // If the lib tries to fetch the blob URL as ArrayBuffer, intercept
      if (urlStr === epubBlobUrl) {
        return new Response(arrayBuffer, { status: 200, headers: { 'content-type': 'application/epub+zip' } });
      }
      return origFetch.call(this, url, opts);
    };

    // Now call open with a URL that ends in .epub
    // We create a fake URL that the lib will fetch -> we intercept it
    TreineticEpubReader.open(epubBlobUrl + '#book.epub');

    // The lib's Pt.load checks endsWith('.epub') — the hash won't help.
    // Let's restore fetch and use direct internal access instead.
    window.fetch = origFetch;

    // Direct approach: manually call what loadEpub does internally
    // readerObj.readerView already exists from create()
    if (readerObj.readerView) {
      // Construct the package using the lib's internal classes
      // The lib's Gt class is not exported, but readerView.openBook just needs
      // an object with the right shape. Let's create a compatible one.

      // Create a minimal package object that ReaderView understands
      const pkg = Object.create(null);
      pkg.rootUrl = '';
      pkg.zip = zip;
      pkg.rendition_layout = epubPackage.rendition_layout;
      pkg.toc = toc;
      pkg.metadata = metadata;

      // Spine needs to be an object with items array and methods
      pkg.spine = {
        package: pkg,
        items: [],
        direction: 'ltr',
        handleLinear: true,
      };

      // Create spine items
      let idx = 0;
      for (const si of spineItems) {
        const item = {
          idref: si.idref,
          href: si.href,
          linear: si.linear,
          index: idx,
          spine: pkg.spine,
          isFixedLayout: () => pkg.rendition_layout === 'pre-paginated',
          isReflowable: () => pkg.rendition_layout !== 'pre-paginated',
          getRenditionLayout: () => pkg.rendition_layout,
        };
        pkg.spine.items.push(item);
        idx++;
      }

      // Add spine helper methods
      pkg.spine.firstLinear = () => pkg.spine.items.find(i => i.linear !== 'no');
      pkg.spine.nextLinear = (item) => {
        for (let i = item.index + 1; i < pkg.spine.items.length; i++) {
          if (pkg.spine.items[i].linear !== 'no') return pkg.spine.items[i];
        }
        return null;
      };
      pkg.spine.prevLinear = (item) => {
        for (let i = item.index - 1; i >= 0; i--) {
          if (pkg.spine.items[i].linear !== 'no') return pkg.spine.items[i];
        }
        return null;
      };
      pkg.spine.getItemByHref = (href) => {
        return pkg.spine.items.find(i => href.endsWith(i.href) || i.href.endsWith(href));
      };

      pkg.isFixedLayout = () => pkg.rendition_layout === 'pre-paginated';

      // resolveRelativeUrl: since we use zip, this returns the path relative to OPF dir
      pkg.resolveRelativeUrl = (path) => opfDir + path;

      // loadFile from zip
      pkg.loadFile = async (path) => {
        // Try the full path first
        let f = zip.file(opfDir + path) || zip.file(path);
        if (!f && path.startsWith('/')) f = zip.file(path.substring(1));
        return f ? await f.async('string') : null;
      };

      // loadBlob from zip
      pkg.loadBlob = async (path) => {
        let f = zip.file(opfDir + path) || zip.file(path);
        if (!f && path.startsWith('/')) f = zip.file(path.substring(1));
        return f ? await f.async('blob') : null;
      };

      // Open the book directly on the readerView
      readerObj.readerView.openBook(pkg);
      readerObj.currentPackageDocument = pkg;

      // Notify via ExternalControls
      if (toc.length > 0) {
        APP.controls.onTOCLoad(toc);
      }
      APP.controls.epubLoaded(metadata, pkg, readerObj.readerView);
    }
  } catch (err) {
    console.error('Failed to load EPUB:', err);
    APP.controls.epubFailed(err.message);
  }
}

/* ═══════════════════════════════════════════════════════
   READER NAVIGATION
═══════════════════════════════════════════════════════ */
document.getElementById('nav-prev').onclick = () => {
  if (APP.controls) APP.controls.prevPage();
};
document.getElementById('nav-next').onclick = () => {
  if (APP.controls) APP.controls.nextPage();
};
document.getElementById('back-to-lib').onclick = () => {
  document.getElementById('reader-screen').classList.remove('active');
  document.getElementById('library-screen').classList.add('active');
  APP.currentBookId = null;
  // Clean up
  document.getElementById('epub-reader-frame').innerHTML = '';
  renderLibrary();
};

// Swipe support
let touchStartX = 0, touchStartY = 0;
document.getElementById('reader-screen').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('reader-screen').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx > 0 && APP.controls) APP.controls.prevPage();
    else if (dx < 0 && APP.controls) APP.controls.nextPage();
  }
}, { passive: true });

// Keyboard
document.addEventListener('keydown', e => {
  if (!APP.currentBookId || !APP.controls) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { APP.controls.nextPage(); e.preventDefault(); }
  if (e.key === 'ArrowLeft') { APP.controls.prevPage(); e.preventDefault(); }
});

/* ═══════════════════════════════════════════════════════
   THEME & FONT SIZE
═══════════════════════════════════════════════════════ */
function applyTheme(theme) {
  APP.theme = theme;
  // Map to library theme
  const themeMap = { night: 'night', sepia: 'sepia', day: 'day' };
  document.documentElement.removeAttribute('data-theme');
  if (theme !== 'night') document.documentElement.setAttribute('data-theme', theme);

  // Map to reader theme
  const readerThemeMap = { night: 'night', sepia: 'sepia', day: 'day' };
  if (APP.controls) {
    APP.controls.setTheme(readerThemeMap[theme]);
  }

  // Update buttons
  document.querySelectorAll('#theme-btns .setting-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === theme);
  });

  // Theme toggle icon
  const toggleBtn = document.getElementById('theme-toggle-btn');
  toggleBtn.textContent = theme === 'night' ? '🌙' : theme === 'sepia' ? '📜' : '☀️';

  localStorage.setItem('liseuse-theme', theme);
}

function applyFontSize(size) {
  APP.fontSize = size;
  if (APP.controls) {
    APP.controls.changeFontSize(size);
  }
  document.getElementById('font-slider').value = size;
  document.getElementById('font-size-label').textContent = size;
  localStorage.setItem('liseuse-fontsize', size);
}

/* ═══════════════════════════════════════════════════════
   TOC
═══════════════════════════════════════════════════════ */
function buildTOC(toc) {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  if (!toc || toc.length === 0) {
    list.innerHTML = '<p style="font-size:.85rem;color:var(--text2)">Pas de table des matières</p>';
    return;
  }

  function renderItems(items, depth = 0) {
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'toc-item' + (depth > 0 ? ' sub' : '');
      div.textContent = item.name || item.title || 'Sans titre';
      div.onclick = () => {
        const href = item.Id_link || item.href || '';
        if (href && APP.controls) {
          APP.controls.goToPage(href);
          closeAllPanels();
        }
      };
      list.appendChild(div);
      if (item.sub && item.sub.length > 0) {
        renderItems(item.sub, depth + 1);
      }
    });
  }
  renderItems(toc);
}

/* ═══════════════════════════════════════════════════════
   PANELS
═══════════════════════════════════════════════════════ */
function openPanel(panelId) {
  closeAllPanels();
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById(panelId).classList.add('open');
}
function closeAllPanels() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
}
document.getElementById('panel-overlay').onclick = closeAllPanels;
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.onclick = closeAllPanels;
});

document.getElementById('btn-toc').onclick = () => openPanel('toc-panel');
document.getElementById('btn-bookmarks').onclick = () => openPanel('bookmarks-panel');
document.getElementById('btn-settings').onclick = () => openPanel('settings-panel');

/* ═══════════════════════════════════════════════════════
   SETTINGS EVENTS
═══════════════════════════════════════════════════════ */
document.querySelectorAll('#theme-btns .setting-btn').forEach(btn => {
  btn.onclick = () => applyTheme(btn.dataset.theme);
});

document.getElementById('font-slider').oninput = e => {
  applyFontSize(parseInt(e.target.value));
};

document.getElementById('theme-toggle-btn').onclick = () => {
  const themes = ['night', 'sepia', 'day'];
  const idx = themes.indexOf(APP.theme);
  applyTheme(themes[(idx + 1) % themes.length]);
};

/* ═══════════════════════════════════════════════════════
   FILE INPUT
═══════════════════════════════════════════════════════ */
document.getElementById('file-input').onchange = async e => {
  const files = e.target.files;
  for (const f of files) {
    if (f.name.toLowerCase().endsWith('.epub')) {
      await addBook(f);
    }
  }
  e.target.value = '';
};

/* ═══════════════════════════════════════════════════════
   SEARCH & SORT
═══════════════════════════════════════════════════════ */
document.getElementById('search-lib').oninput = renderLibrary;
document.getElementById('sort-lib').onchange = renderLibrary;

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
(async function init() {
  // Load saved theme
  const savedTheme = localStorage.getItem('liseuse-theme') || 'night';
  applyTheme(savedTheme);
  
  const savedSize = parseInt(localStorage.getItem('liseuse-fontsize')) || 100;
  APP.fontSize = savedSize;
  document.getElementById('font-slider').value = savedSize;
  document.getElementById('font-size-label').textContent = savedSize;

  // Load books from IndexedDB
  APP.books = await loadAllBooks();
  renderLibrary();
})();
</script>
